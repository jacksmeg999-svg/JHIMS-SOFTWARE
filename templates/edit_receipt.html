{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Edit Receipt #{{ rec.id }}</h2>
  <form method="post">
    <div class="row">
      <div class="col"><label>Patient ID</label><input type="text" name="patient_id" value="{{ rec.patient_id }}"></div>
      <div class="col"><label>Patient Name</label><input type="text" name="patient_name" value="{{ rec.patient_name }}" required></div>
    </div>
    <div class="row">
      <div class="col">
        <label>Service Received</label>
        <input type="text" name="service_received" value="{{ rec.service_received }}" required>
      </div>
      <div class="col">
        <label>Amount Paid (GHS)</label>
        <input type="number" step="0.01" name="amount_paid" value="{{ rec.amount_paid or 0 }}">
      </div>
      <div class="col">
        <label>Payment Method</label>
        <input type="text" name="payment_method" value="{{ rec.payment_method }}">
      </div>
    </div>
    <div><label>Details</label><textarea name="details">{{ rec.details or '' }}</textarea></div>
    <button class="btn btn-primary" type="submit" style="margin-top:8px;">Save</button>
  </form>
</div>
{% endblock %}
