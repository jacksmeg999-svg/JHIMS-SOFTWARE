{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Activity Log</h2>
  <table>
    <thead><tr><th>ID</th><th>Time</th><th>User</th><th>Action</th><th>Details</th></tr></thead>
    <tbody>
      {% for a in rows %}
      <tr>
        <td>{{ a.id }}</td><td>{{ a.timestamp }}</td><td>{{ a.username }}</td><td>{{ a.action }}</td><td>{{ a.details }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
