<h2>⚙️ Mortuary Price Settings</h2>

<form method="post">

<label>Embalming Fee</label> <input name="embalming_fee" value="{{ s.embalming_fee }}">

<label>Week 1 Rate</label> <input name="week1" value="{{ s.week1_rate }}">

<label>Week 2 Rate</label> <input name="week2" value="{{ s.week2_rate }}">

<label>Week 3+ Rate</label> <input name="week3" value="{{ s.week3_rate }}">

<button type="submit">Save Settings</button>

</form>
