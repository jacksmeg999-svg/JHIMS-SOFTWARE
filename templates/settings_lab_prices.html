{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Lab Prices</h2>
  <form method="post">
    <table>
      <thead><tr><th>Test</th><th>Insured</th><th>Non-insured</th></tr></thead>
      <tbody>
        {% for r in rows %}
        <tr>
          <td>{{ r.name }}</td>
          <td><input type="number" step="0.01" name="ins_{{ r.id }}" value="{{ r.insured_price }}"></td>
          <td><input type="number" step="0.01" name="non_{{ r.id }}" value="{{ r.non_insured_price }}"></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <button class="btn btn-primary" type="submit" style="margin-top:6px;">Save Prices</button>
  </form>
</div>
{% endblock %}
