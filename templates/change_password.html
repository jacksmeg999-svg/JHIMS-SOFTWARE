{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:420px;margin:40px auto;">
  <h2>Change Password</h2>
  <form method="post">
    <div><label>Current password</label><input type="password" name="current" required></div>
    <div><label>New password</label><input type="password" name="new" required></div>
    <button class="btn btn-primary" type="submit" style="margin-top:8px;">Change</button>
  </form>
</div>
{% endblock %}
