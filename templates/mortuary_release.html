{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Release Body - {{ case.corpse_name }} ({{ case.corpse_id }})</h2>
  <p>Deposit date: {{ case.deposit_date }} | Current release: {{ case.release_date or '-' }}</p>
  <form method="post" class="no-print">
    <div class="row">
      <div class="col"><label>Release Date</label><input type="date" name="release_date" required value="{{ case.release_date }}"></div>
    </div>
    <div><label>Extra Items / Notes</label><input type="text" name="extra_items" value="{{ case.extra_items or '' }}"></div>
    <div class="row">
      <div class="col"><label>Extra Amount (GHS)</label><input type="number" step="0.01" name="extra_amount" value="{{ case.extra_amount or 0 }}"></div>
    </div>
    <button class="btn btn-primary" type="submit" style="margin-top:6px;">Save &amp; Recalculate</button>
  </form>
</div>
{% endblock %}
