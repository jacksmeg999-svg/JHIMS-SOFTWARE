{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Manage Accounts</h2>
  <form method="post" class="no-print" style="margin-bottom:8px;">
    <div class="row">
      <div class="col"><label>Username</label><input type="text" name="username" required></div>
      <div class="col"><label>Password</label><input type="password" name="password" required></div>
      <div class="col">
        <label>Role</label>
        <select name="role">
          <option>Admin</option><option>Cashier</option><option>Lab</option><option>Mortuary</option><option>Reports</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" type="submit">Add User</button>
  </form>
  <table>
    <thead><tr><th>ID</th><th>Username</th><th>Role</th><th>Actions</th></tr></thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.id }}</td><td>{{ u.username }}</td><td>{{ u.role }}</td>
        <td>
          <a class="btn btn-secondary" href="{{ url_for('edit_user', user_id=u.id) }}">Edit</a>
          <form method="post" action="{{ url_for('delete_user', user_id=u.id) }}" style="display:inline;">
            <button class="btn btn-danger" type="submit" onclick="return confirm('Delete user?')">Del</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
